version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cloudapp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudapp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudapp_password}
      POSTGRES_DB: ${POSTGRES_DB:-cloudapp_db}
      POSTGRES_INITDB_ARGS: "-c max_connections=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudapp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudapp-network

  redis:
    image: redis:7-alpine
    container_name: cloudapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudapp-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: cloudapp-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudapp_user}:${POSTGRES_PASSWORD:-cloudapp_password}@postgres:5432/${POSTGRES_DB:-cloudapp_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloudapp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: cloudapp-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WEBSOCKET_URL=ws://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - cloudapp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: cloudapp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cloudapp-network

  adminer:
    image: adminer:latest
    container_name: cloudapp-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - cloudapp-network
    environment:
      - ADMINER_DEFAULT_SERVER=postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cloudapp-network:
    driver: bridge
