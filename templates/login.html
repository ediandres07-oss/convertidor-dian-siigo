<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DIAN Pro V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .login-header .logo {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
            display: block;
        }

        .demo-users {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 13px;
            color: #666;
        }

        .demo-users h3 {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .demo-users ul {
            list-style: none;
            padding-left: 0;
        }

        .demo-users li {
            padding: 5px 0;
            color: #666;
        }

        .demo-users code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">📊</div>
            <h1>DIAN Pro V2</h1>
            <p>Convertidor DIAN → Siigo</p>
        </div>

        <div id="mensaje" class="message"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" placeholder="admin" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Iniciar Sesión</button>
        </form>

        <div class="demo-users">
            <h3>👤 Usuario:</h3>
            <ul>
                <li><code>ediandres@hotmail.com</code></li>
                <li><code>Samuel2812*</code></li>
            </ul>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('password').value;
            const mensaje = document.getElementById('mensaje');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `usuario=${encodeURIComponent(usuario)}&password=${encodeURIComponent(password)}`
                });

                const data = await response.json();

                if (data.success) {
                    mensaje.textContent = '✅ ' + data.mensaje;
                    mensaje.className = 'message success';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    mensaje.textContent = '❌ ' + data.error;
                    mensaje.className = 'message error';
                }
            } catch (error) {
                mensaje.textContent = '❌ Error: ' + error.message;
                mensaje.className = 'message error';
            }
        }

        // Auto-fill con usuario real (solo en desarrollo)
        window.addEventListener('load', () => {
            document.getElementById('usuario').value = 'ediandres@hotmail.com';
            document.getElementById('password').value = 'Samuel2812*';
        });
    </script>
</body>
</html>
